<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helping Hand – Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-amber-50 text-gray-900 min-h-screen flex flex-col">

  <nav class="sticky top-0 z-50 bg-green-800 shadow-md">
    <div class="w-full px-10 py-3 flex items-center justify-between">
      <a href="../index.html" class="text-2xl font-bold text-yellow-300">Helping<span class="text-white">Hand</span></a>
      <ul class="hidden md:flex gap-6 text-sm font-medium text-white/80">
        <li><a href="../index.html" class="hover:text-yellow-300 transition-colors">Home</a></li>
        <li><a href="booking.html" class="hover:text-yellow-300 transition-colors">Book a Service</a></li>
        <li><a href="contact.html" class="hover:text-yellow-300 transition-colors">Contact</a></li>
      </ul>
      <div class="flex gap-3">
        <a href="login.html"
          class="px-4 py-2 text-sm font-semibold border-2 border-white/50 text-white rounded-lg hover:bg-green-700 transition-colors">Login</a>
        <a href="signup.html"
          class="px-4 py-2 text-sm font-semibold bg-yellow-300 text-gray-900 rounded-lg hover:bg-yellow-400 transition-colors">Sign
          Up</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 py-16 bg-gradient-to-br from-green-50 to-amber-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8">

      <h2 class="text-3xl font-bold text-gray-900 mb-1">Create Account</h2>
      <p class="text-sm text-gray-500 mb-6">Join and start booking home services</p>

      <form novalidate>
        <div class="flex flex-col gap-1 mb-4">
          <label for="name" class="text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" id="name" placeholder="Your full name" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <div class="flex flex-col gap-1 mb-4">
          <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <div class="flex flex-col gap-1 mb-4">
          <label for="phone" class="text-sm font-medium text-gray-700">Phone Number</label>
          <input type="tel" id="phone" placeholder="+880 1X XX XXX XXX" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <div class="flex flex-col gap-1 mb-6">
          <label for="password" class="text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" placeholder="Create a password (minimum 8 characters)" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <button type="submit"
          class="w-full py-3 bg-green-800 text-white font-semibold rounded-lg hover:bg-green-900 transition-colors shadow-md">Create
          Account</button>

        <div id="success-msg"
          class="hidden mt-4 text-center text-sm text-green-800 bg-green-50 border border-green-300 rounded-lg py-3 px-4">
          ✅ Account created! You can now login.
        </div>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="login.html" class="text-green-800 font-medium hover:underline">Login</a>
      </p>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-5 text-center text-sm">
    © 2026 <span class="text-yellow-300 font-semibold">HelpingHand</span>. All rights reserved.
  </footer>

  <script src="../js/script.js"></script>
</body>

</html>
