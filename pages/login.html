<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helping Hand – Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-amber-50 text-gray-900">

  <nav class="bg-green-800 fixed w-full z-50 top-0 start-0 shadow-md border-b border-green-700">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-4 py-3">

      <a href="../index.html" class="text-2xl font-bold text-yellow-300">
        Helping<span class="text-white">Hand</span>
      </a>

      <div class="flex md:order-2 items-center gap-2">
        <a href="./login.html"
          class="hidden md:inline-block px-4 py-2 text-sm font-semibold border-2 border-white/50 text-white rounded-lg hover:bg-green-700 transition-colors">
          Login
        </a>
        <a href="./signup.html"
          class="hidden md:inline-block px-4 py-2 text-sm font-semibold bg-yellow-300 text-gray-900 rounded-lg hover:bg-yellow-400 transition-colors">
          Sign Up
        </a>
        <button onclick="toggleMenu()" type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-white rounded-lg md:hidden hover:bg-green-700 focus:outline-none">
          <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
          </svg>
        </button>
      </div>

      <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-sticky">
        <ul
          class="flex flex-col w-full mt-4 md:mt-0 md:flex-row md:gap-6 text-sm font-medium bg-green-900 md:bg-transparent rounded-lg md:rounded-none p-4 md:p-0">
          <li><a href="../index.html"
              class="block py-2 px-3 md:p-0 text-white hover:text-yellow-300 transition-colors">Home</a></li>
          <li><a href="../index.html#services"
              class="block py-2 px-3 md:p-0 text-white/80 hover:text-yellow-300 transition-colors">Services</a></li>
          <li><a href="../index.html#reviews"
              class="block py-2 px-3 md:p-0 text-white/80 hover:text-yellow-300 transition-colors">Reviews</a></li>
          <li><a href="../index.html#faq"
              class="block py-2 px-3 md:p-0 text-white/80 hover:text-yellow-300 transition-colors">FAQ</a></li>
          <li><a href="./comments.html"
              class="block py-2 px-3 md:p-0 text-white/80 hover:text-yellow-300 transition-colors">Comments</a></li>
          <li><a href="./contact.html"
              class="block py-2 px-3 md:p-0 text-white/80 hover:text-yellow-300 transition-colors">Contact</a></li>
          <li class="flex gap-2 pt-3 mt-1 border-t border-white/20 md:hidden">
            <a href="./login.html"
              class="px-4 py-2 text-sm font-semibold border-2 border-white/50 text-white rounded-lg hover:bg-green-700 transition-colors">Login</a>
            <a href="./signup.html"
              class="px-4 py-2 text-sm font-semibold bg-yellow-300 text-gray-900 rounded-lg hover:bg-yellow-400 transition-colors">Sign
              Up</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center bg-amber-50 pt-16">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8">

      <h2 class="text-3xl font-bold text-gray-900 mb-1">Welcome Back</h2>
      <p class="text-sm text-gray-500 mb-6">Login to manage your bookings</p>

      <form novalidate>
        <div class="flex flex-col gap-1 mb-4">
          <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <div class="flex flex-col gap-1 mb-6">
          <label for="password" class="text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required
            class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-transparent hover:border-gray-400 transition-colors" />
        </div>

        <button type="submit"
          class="w-full py-3 bg-green-800 text-white font-semibold rounded-lg hover:bg-green-900 transition-colors shadow-md">Login</button>

        <div id="success-msg"
          class="hidden mt-4 text-center text-sm text-green-800 bg-green-50 border border-green-300 rounded-lg py-3 px-4">
          ✅ Logged in successfully!
        </div>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account? <a href="signup.html" class="text-green-800 font-medium hover:underline">Sign Up</a>
      </p>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-5 text-center text-sm">
    © 2026 <span class="text-yellow-300 font-semibold">HelpingHand</span>. All rights reserved.
  </footer>

  <script src="../js/script.js"></script>
</body>

</html>
